<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Interview Agent</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header>
    <div>
      <div class="brand">AI Interview Agent</div>
      <div class="subtitle">Resume-based technical interview simulator</div>
    </div>
    <div class="status" id="status">Ready</div>
  </header>

  <main>
    <aside class="panel setup-panel">
      <div class="stack">
        <div>
          <p class="eyebrow">Interview setup</p>
          <h2>이력서 업로드</h2>
          <p class="hint">PDF를 분석해 지원자 키워드를 추출하고 맞춤형 질문을 시작합니다.</p>
        </div>
        <label class="upload-box" for="resume">
          <span class="upload-icon">PDF</span>
          <span>
            <strong>이력서 PDF 선택</strong>
            <small id="fileName">선택된 파일 없음</small>
          </span>
        </label>
        <input id="resume" type="file" accept="application/pdf" />
        <button id="startBtn">면접 시작</button>
        <div class="error" id="errorBox"></div>
      </div>
    </aside>

    <section class="chat panel">
      <div class="chat-head">
        <div>
          <p class="eyebrow">Live interview</p>
          <h1>기술 면접</h1>
        </div>
        <div class="question-pill"><span id="questionCountTop">0</span> questions</div>
      </div>
      <div class="messages" id="messages">
        <div class="empty">
          <div class="empty-avatar">AI</div>
          <strong>면접을 시작할 준비가 되었습니다.</strong>
          <span>왼쪽에서 이력서 PDF를 업로드하고 면접 시작을 눌러주세요.</span>
        </div>
      </div>
      <div class="composer">
        <textarea id="answer" placeholder="답변을 입력하세요" disabled></textarea>
        <button id="sendBtn" disabled>전송</button>
      </div>
    </section>

    <aside class="panel meta">
      <p class="eyebrow">Candidate</p>
      <h2>지원자 정보</h2>
      <div class="kv">
        <div>
          <div class="label">이름</div>
          <div class="value" id="name">-</div>
        </div>
        <div>
          <div class="label">질문 수</div>
          <div class="value" id="questionCount">0</div>
        </div>
      </div>
      <h2>핵심 키워드</h2>
      <div class="chips" id="keywords"></div>
      <div class="result" id="result"></div>
    </aside>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
